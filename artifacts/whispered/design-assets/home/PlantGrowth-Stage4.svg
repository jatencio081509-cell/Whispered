<svg width="140" height="170" viewBox="0 0 140 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pot { fill: var(--card, #F8FAFC); stroke: var(--border, #E2E8F0); stroke-width: 2; }
      .soil { fill: var(--muted, #94A3B8); }
      .stem { fill: var(--primary, #0EA5E9); }
      .leaf { fill: var(--accent, #22C55E); }
    </style>
  </defs>
  <!-- Pot -->
  <rect x="20" y="105" width="100" height="48" rx="8" class="pot"/>
  <!-- Soil -->
  <rect x="25" y="95" width="90" height="18" rx="4" class="soil"/>
  <!-- Stem -->
  <rect x="62" y="25" width="12" height="72" rx="6" class="stem"/>
  <!-- Leaves -->
  <ellipse cx="40" cy="45" rx="18" ry="9" class="leaf" transform="rotate(-35 40 45)"/>
  <ellipse cx="95" cy="45" rx="18" ry="9" class="leaf" transform="rotate(35 95 45)"/>
  <ellipse cx="62" cy="22" rx="16" ry="9" class="leaf"/>
  <ellipse cx="85" cy="60" rx="14" ry="7" class="leaf" transform="rotate(40 85 60)"/>
  <ellipse cx="50" cy="68" rx="14" ry="7" class="leaf" transform="rotate(-40 50 68)"/>
</svg>