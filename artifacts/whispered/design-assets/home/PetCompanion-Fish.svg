<svg width="90" height="90" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Theme color variables - edit these in Sketch -->
    <style>
      .bowl-color { fill: var(--bowl-color, #FFFFFF); }
      .bowl-border { fill: var(--bowl-border, rgba(0,0,0,0.1)); }
      .water-gradient-1 { fill: var(--water-color-1, #0284C7); }
      .water-gradient-2 { fill: var(--water-color-2, #14B8A6); }
      .fish-body { fill: var(--fish-body, #FFFFFF); }
      .fish-tail { fill: var(--fish-tail, #14B8A6); }
      .fish-fin { fill: var(--fish-fin, #14B8A6); }
      .eye-white { fill: #FFFFFF; }
      .eye-pupil { fill: var(--pet-eye-color, #082F49); }
      .mouth-color { fill: var(--pet-mouth-color, rgba(0,0,0,0.2)); }
      .bubble-color { fill: var(--bubble-color, #0284C7); }
      .shadow-color { fill: var(--shadow-color, rgba(0,0,0,0.12)); }
      .level-dot-active { fill: var(--level-dot-active, #FFFFFF); }
      .level-dot-inactive { fill: var(--level-dot-inactive, rgba(0,0,0,0.2)); }
    </style>
    
    <!-- Water gradient -->
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" class="water-gradient-1"/>
      <stop offset="100%" class="water-gradient-2"/>
    </linearGradient>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="45" cy="85" rx="35" ry="3" class="shadow-color"/>
  
  <!-- Fish bowl -->
  <circle cx="45" cy="45" r="40" class="bowl-color" stroke="var(--bowl-border)" stroke-width="3"/>
  
  <!-- Water -->
  <circle cx="45" cy="45" r="37" fill="url(#waterGradient)" class="water-gradient-1"/>
  
  <!-- Fish body -->
  <ellipse cx="45" cy="42" rx="22" ry="15" class="fish-body"/>
  
  <!-- Fish tail -->
  <polygon points="67,42 82,35 82,49" class="fish-tail"/>
  
  <!-- Fish eye -->
  <circle cx="35" cy="40" r="4" class="eye-white"/>
  <circle cx="35" cy="40" r="2" class="eye-pupil"/>
  
  <!-- Fish mouth -->
  <ellipse cx="28" cy="44" rx="3" ry="1.5" class="mouth-color"/>
  
  <!-- Fish fin (top) -->
  <polygon points="45,27 52,35 38,35" class="fish-fin"/>
  
  <!-- Fish fin (side) -->
  <polygon points="28,42 35,48 20,50" class="fish-fin" transform="rotate(-30 28 46)"/>
  
  <!-- Bubbles -->
  <circle cx="60" cy="30" r="4" class="bubble-color" opacity="0.4"/>
  <circle cx="70" cy="20" r="2.5" class="bubble-color" opacity="0.4"/>
  <circle cx="55" cy="25" r="2" class="bubble-color" opacity="0.4"/>
  
  <!-- Level indicator dots -->
  <g transform="translate(45, 88)">
    <circle cx="-10" cy="0" r="2.5" class="level-dot-active"/>
    <circle cx="0" cy="0" r="2.5" class="level-dot-inactive"/>
    <circle cx="10" cy="0" r="2.5" class="level-dot-inactive"/>
  </g>
</svg>
