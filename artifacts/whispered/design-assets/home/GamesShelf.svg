<svg width="200" height="100" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .shelf { fill: var(--card, #F8FAFC); stroke: var(--border, #E2E8F0); stroke-width: 2; }
      .game { fill: var(--primary, #0EA5E9); }
    </style>
  </defs>
  <!-- Shelf -->
  <rect x="10" y="70" width="180" height="12" rx="4" class="shelf"/>
  <!-- Game 1 (Controller) -->
  <rect x="30" y="45" width="35" height="22" rx="6" class="game"/>
  <!-- Game 2 (Cards) -->
  <rect x="85" y="45" width="30" height="22" rx="4" class="game"/>
  <!-- Game 3 -->
  <rect x="135" y="45" width="35" height="22" rx="6" class="game"/>
</svg>