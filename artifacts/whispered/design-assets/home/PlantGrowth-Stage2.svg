<svg width="120" height="150" viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pot { fill: var(--card, #F8FAFC); stroke: var(--border, #E2E8F0); stroke-width: 2; }
      .soil { fill: var(--muted, #94A3B8); }
      .stem { fill: var(--primary, #0EA5E9); }
      .leaf { fill: var(--accent, #22C55E); }
    </style>
  </defs>
  <!-- Pot -->
  <rect x="30" y="95" width="60" height="38" rx="8" class="pot"/>
  <!-- Soil -->
  <rect x="35" y="88" width="50" height="14" rx="4" class="soil"/>
  <!-- Stem -->
  <rect x="56" y="45" width="8" height="43" rx="4" class="stem"/>
  <!-- Leaves -->
  <ellipse cx="45" cy="55" rx="14" ry="7" class="leaf" transform="rotate(-25 45 55)"/>
  <ellipse cx="75" cy="55" rx="14" ry="7" class="leaf" transform="rotate(25 75 55)"/>
  <ellipse cx="60" cy="38" rx="10" ry="6" class="leaf"/>
</svg>