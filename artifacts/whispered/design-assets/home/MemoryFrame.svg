<svg width="220" height="180" viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Theme color variables - edit these in Sketch -->
    <style>
      .frame-outer-1 { fill: var(--frame-color-1, #FFFFFF); }
      .frame-outer-2 { fill: var(--frame-color-2, #0284C7); }
      .frame-outer-3 { fill: var(--frame-color-3, #FFFFFF); }
      .frame-inner { fill: var(--frame-inner-color, #F0F0F0); }
      .frame-shadow { fill: var(--shadow-color, rgba(0,0,0,0.15)); }
      .glow-effect { fill: var(--glow-color, #0284C7); }
      .frame-detail { fill: var(--detail-color, rgba(0,0,0,0.1)); }
      .placeholder-icon { fill: var(--placeholder-color, #0284C7); }
      .placeholder-line { fill: var(--placeholder-line-color, rgba(0,0,0,0.2)); }
    </style>
    
    <!-- Frame border gradient -->
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="frame-outer-1"/>
      <stop offset="50%" class="frame-outer-2"/>
      <stop offset="100%" class="frame-outer-3"/>
    </linearGradient>
    
    <!-- Glow gradient -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" class="glow-effect" stop-opacity="0.6"/>
      <stop offset="100%" class="glow-effect" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Frame shadow -->
  <rect x="12" y="172" width="196" height="12" rx="6" class="frame-shadow"/>
  
  <!-- Outer frame -->
  <rect x="0" y="0" width="220" height="180" rx="12" fill="url(#frameGradient)" class="frame-outer-1"/>
  
  <!-- Inner frame -->
  <rect x="8" y="8" width="204" height="164" rx="6" class="frame-inner"/>
  
  <!-- Glow effect -->
  <rect x="8" y="8" width="204" height="164" rx="6" fill="url(#glowGradient)" opacity="0.3"/>
  
  <!-- Placeholder content (replace with image when available) -->
  <g transform="translate(110, 90)">
    <!-- Placeholder icon -->
    <circle cx="0" cy="-10" r="24" class="placeholder-icon" opacity="0.3"/>
    
    <!-- Placeholder lines -->
    <rect x="-40" y="15" width="80" height="8" rx="4" class="placeholder-line" opacity="0.5"/>
    <rect x="-40" y="30" width="60" height="8" rx="4" class="placeholder-line" opacity="0.5"/>
  </g>
  
  <!-- Frame details (decorative dots) -->
  <circle cx="20" cy="20" r="4" class="frame-detail" opacity="0.4"/>
  <circle cx="200" cy="20" r="4" class="frame-detail" opacity="0.4"/>
  
  <!-- Image placeholder text -->
  <text x="110" y="95" text-anchor="middle" font-family="System" font-size="12" fill="rgba(0,0,0,0.3)">
    Memory Image
  </text>
</svg>
