<svg width="100" height="130" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .base { fill: var(--card, #F8FAFC); stroke: var(--border, #E2E8F0); stroke-width: 2; }
      .lamp { fill: var(--primary, #0EA5E9); }
      .glow { fill: var(--primary, #0EA5E9); opacity: 0.2; }
    </style>
  </defs>
  <!-- Glow -->
  <ellipse cx="50" cy="55" rx="35" ry="25" class="glow"/>
  <!-- Lamp Body -->
  <ellipse cx="50" cy="50" rx="22" ry="18" class="lamp"/>
  <!-- Base -->
  <rect x="30" y="95" width="40" height="12" rx="4" class="base"/>
  <rect x="35" y="85" width="30" height="12" rx="3" class="base"/>
</svg>