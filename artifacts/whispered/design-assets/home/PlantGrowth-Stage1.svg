<svg width="120" height="140" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pot { fill: var(--card, #F8FAFC); stroke: var(--border, #E2E8F0); stroke-width: 2; }
      .soil { fill: var(--muted, #94A3B8); }
      .stem { fill: var(--primary, #0EA5E9); }
      .leaf { fill: var(--accent, #22C55E); }
    </style>
  </defs>
  <!-- Pot -->
  <rect x="35" y="90" width="50" height="35" rx="8" class="pot"/>
  <!-- Soil -->
  <rect x="40" y="85" width="40" height="12" rx="4" class="soil"/>
  <!-- Stem -->
  <rect x="57" y="55" width="6" height="30" rx="3" class="stem"/>
  <!-- Leaves -->
  <ellipse cx="48" cy="60" rx="12" ry="6" class="leaf" transform="rotate(-30 48 60)"/>
  <ellipse cx="72" cy="60" rx="12" ry="6" class="leaf" transform="rotate(30 72 60)"/>
</svg>