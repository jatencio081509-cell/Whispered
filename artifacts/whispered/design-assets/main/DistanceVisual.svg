<svg width="300" height="120" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pin { fill: var(--primary, #0EA5E9); }
      .line { stroke: var(--primary, #0EA5E9); stroke-width: 3; }
      .distance-text { fill: var(--text, #0F172A); font-family: Inter, sans-serif; font-size: 18px; font-weight: 600; }
      .label { fill: var(--muted-foreground, #64748B); font-family: Inter, sans-serif; font-size: 13px; }
    </style>
  </defs>

  <!-- Connecting Line -->
  <line x1="60" y1="60" x2="240" y2="60" class="line" stroke-linecap="round"/>

  <!-- Left Pin (You) -->
  <g>
    <circle cx="60" cy="60" r="18" class="pin"/>
    <circle cx="60" cy="60" r="8" fill="white"/>
    <text x="60" y="64" text-anchor="middle" fill="var(--primary, #0EA5E9)" font-size="14" font-weight="bold">Y</text>
  </g>

  <!-- Right Pin (Partner) -->
  <g>
    <circle cx="240" cy="60" r="18" class="pin"/>
    <circle cx="240" cy="60" r="8" fill="white"/>
    <text x="240" y="64" text-anchor="middle" fill="var(--primary, #0EA5E9)" font-size="14" font-weight="bold">P</text>
  </g>

  <!-- Distance Text -->
  <text x="150" y="45" text-anchor="middle" class="distance-text">12.4 mi</text>
  <text x="150" y="85" text-anchor="middle" class="label">A drive away</text>
</svg>