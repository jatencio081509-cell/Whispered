kind = "mobile"
previewPath = "/"
title = "Whispered"
version = "1.0.0"
id = "artifacts/whispered"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21037

[services.development]
run = "pnpm --filter @workspace/whispered run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/whispered", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/whispered", "run", "serve" ]

[services.env]
PORT = "21037"
BASE_PATH = "/"
